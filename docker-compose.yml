version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://loan_lens:loan_lens@db:5432/loan_lens
      - MODEL_VERSION=1.0.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_data:/app
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: loan_lens
      POSTGRES_PASSWORD: loan_lens
      POSTGRES_DB: loan_lens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_lens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  model_data:
